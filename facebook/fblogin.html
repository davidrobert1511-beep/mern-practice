<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #f0f2f5;
            font-size: x-large;
        }
      
        </style>
</head>
<form onsubmit="form()" action="JavaScript:void(0)">
    <table align="center" cellpadding="20" cellspacing="20" width="50%">
        <tr>
            <td colspan="2" style="font-size:x-large;">Get started on Facebook <br>
                Create an account to connect with friends, family and communities of people<br> who share your interests.
            </td>
        </tr>
        <tr>
            <th><label> Name </label> </th>
        </tr>
        <tr>
            <td> <input type="text" name="name" placeholder="first name" id="fname" style="width: 100%; height: 30px;" align="center"> </td>
            <td> <input type="text" name="name" placeholder="surname" id="sname" style="width: 100%; height: 30px;" align="center "> </td>
        </tr>
    </table>

    <table align="center" cellpadding="20" cellspacing="20" width="50%"> 
            <tr>
                <th><label> Date of Birth </label> </th>
                </tr>
        <tr>
            <td> 
                <select name="day" id="day" style="width: 100%; height: 30px;" align="center">
                    <option value="">Day</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </td>
      
       
            <td>
                <select name="month" id="month" style="width: 100%; height: 30px;" align="center">
                    <option value="">Month</option>
                    <option value="jan">Jan</option>
                    <option value="feb">Feb</option>
                    <option value="mar">Mar</option>
                    <option value="apr">Apr</option>
                    <option value="may">May</option>
                    <option value="jun">Jun</option>
                    <option value="jul">Jul</option>
                    <option value="aug">Aug</option>
                    <option value="sep">Sep</option>
                    <option value="oct">Oct</option>
                </select>
            </td>
       
       
            <td>    
                <select name="year" id="year" style="width: 100%; height: 30px;" align="center">
                    <option value="">Year</option>
                    <option value="1990">1990</option>
                    <option value="1991">1991</option>
                    <option value="1992">1992</option>
                    <option value="1993">1993</option>
                    <option value="1994">1994</option>
                </select>
            </td>
        </tr>
        <tr> 
            <th><label> Gender </label> </th> 
        </tr>
        <tr>
            <td colspan="3" align="center" width="100%">
            <select name="gender" id="gender" style="width: 100%; height: 30px;" align="center">
                <option value="" style="width: 100%; height: 30px;" align="center">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
            </td>
        </tr>
        <tr>
            <th><label>Mobile Number or Email</label></th>
        </tr>
        <tr>
            <td colspan="3" align="center">
                <input type="text" name="mobile" id="mno" placeholder="Mobile Number or Email" style="width: 100%; height: 30px;" align="center">
            </td>
        </tr>
        <tr>
            <th><label>Password</label></th>
        </tr>
        <tr>
            <td colspan="3" align="center">
                <input type="password" name="password" id="pass" placeholder="Password" style="width: 100%; height: 30px;" align="center" >
            </td>
        </tr>
        <tr>
            <td colspan="3" align="center">
                <input type="submit" name="submit" Value="submit" style="width: 100%; background-color: blue; color: white; border: none; border-radius: 30px;" align="center">
            </td>
        </tr>
            
            </table>
</form>
            <script src="assets/facebook.js"></script>

</body>
</html>

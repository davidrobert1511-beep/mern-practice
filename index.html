<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: aqua;
        }
        table {
            margin: 20px auto;
            background-color: pink;
        }
        th, td {
            padding: 10px;
        }
    </style>
</head>
<body align="center">
    <marquee> Welcome to our Registration Form </marquee>
    <h1> Registration Form </h1>
    <table border="1" align="center" cellpadding="10" cellspacing="10">
        <tr>
                    <th><label> First Name </label> </th>
                    <td> <input type="text" name="name" > </td>
        </tr>
         <tr>
                    <th><label> Last Name </label> </th>
                    <td> <input type="text" name="name"> </td>
        </tr>

        <tr>
                    <th><label> Email </label> </th>
                    <td> <input type="email" name="email" placeholder="Enter your email"> </td>
        </tr>
        <tr>
                    <th><label> Password </label> </th>
                    <td> <input type="password" name="password"> </td>
        </tr>
        
            <tr>
                <th>Gender</th>
                <td>
                    <input type="radio" name="gender" value="male"> Male
                    <input type="radio" name="gender" value="female"> Female
                </td>
            </tr>
             <tr>
                <th> Higest Qualification</th>
                <td>
                    <input type="radio" name="q" value="10th"> 10th
                    <input type="radio" name="q" value="12th"> 12th
                    <input type="radio" name="q" value=" BCA graduation"> BCA Graduation
                </td>
            </tr>
            <th>Skills</th>
                <td>
                    <input type="checkbox" name="s" value="HTML"> HTML
                    <input type="checkbox" name="s" value="CSS"> CSS 
                    <input type="checkbox" name="s" value="JS"> JS
                </td>
            </tr>
            <tr>
                <th>City</th>
                <td>
                    <select name="city">
                        <option value=""> Delhi</option>
                        <option value=""> Meerut </option>
                        <option value="">Noida</option>
                        <option value="">Agra</option>
                    </select>
                </td>
            </tr>
             <tr>
                    <th><label> DOB </label> </th>
                    <td> <input type="date" name="date"> </td>
        </tr>
         <tr>
                    <th><label> Range </label> </th>
                    <td> <input type="range" name="range"> </td>
        </tr>
            <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Submit">
            </td>
            </tr>
    </table>
</body>
</html>
